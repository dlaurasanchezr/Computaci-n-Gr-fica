<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Ejercicio 8 – Menú Completo</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="card wide">
    <h2>Ejercicio 8 — Menú Completo</h2>

    <label for="opcion">Elige una opción:</label>
    <select id="opcion" onchange="mostrarCampos()">
      <option value="0">-- selecciona un ejercicio --</option>
      <option value="1">1 – Número perfecto</option>
      <option value="2">2 – Cuadrados o cubos</option>
      <option value="3">3 – Invertir dígitos</option>
      <option value="4">4 – Palíndromo</option>
      <option value="5">5 – Contar dígito</option>
      <option value="6">6 – Decimal a binario</option>
      <option value="7">7 – Primo / Par / Impar</option>
    </select>

    <div id="campos"></div>

    <button onclick="ejecutarOpcion()">▶ Ejecutar</button>
    <div class="output" id="output"></div>
  </div>
  <script src="exercise8.js"></script>
</body>
</html>
